name: Docker Build

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - ".dockerignore"
      - ".env.example"
      - ".gitea/workflows/docker-build.yml"
      - ".gitea/workflows/docker-publish.yml"
      - "Dockerfile"
      - "README.md"
      - "dashboard/**"
      - "docker/**"
      - "requirements.txt"
      - "scripts/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker build --pull --tag kseb-bill-stats:${GITHUB_SHA} .
